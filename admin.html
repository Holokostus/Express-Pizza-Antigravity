<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/icon.jpg">
    <link rel="apple-touch-icon" href="/images/icon.jpg">
    <title>Express Pizza — Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-10">
        <header class="mb-8 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold">Панель аналитики</h1>
                <p class="text-slate-400 mt-1">Ключевые метрики Express Pizza за сегодня и динамика за 7 дней.</p>
            </div>
            <div class="flex items-center gap-3">
                <a href="menu-manager.html"
                    class="rounded-lg bg-amber-500/20 border border-amber-400/40 px-4 py-2 text-sm font-semibold text-amber-200 hover:bg-amber-500/30 transition-colors">🍽️
                    Управление меню</a>
                <a href="index.html" class="text-sm text-red-400 hover:text-red-300 transition-colors">← На сайт</a>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
            <article class="rounded-2xl bg-slate-900 border border-slate-800 p-6 shadow-lg">
                <p class="text-slate-400 text-sm mb-2">Выручка за сегодня</p>
                <p id="kpi-revenue" class="text-3xl font-extrabold text-emerald-400">—</p>
            </article>
            <article class="rounded-2xl bg-slate-900 border border-slate-800 p-6 shadow-lg">
                <p class="text-slate-400 text-sm mb-2">Средний чек (AOV)</p>
                <p id="kpi-aov" class="text-3xl font-extrabold text-blue-400">—</p>
            </article>
            <article class="rounded-2xl bg-slate-900 border border-slate-800 p-6 shadow-lg">
                <p class="text-slate-400 text-sm mb-2">Долг по баллам</p>
                <p id="kpi-loyalty" class="text-3xl font-extrabold text-amber-400">—</p>
            </article>
        </section>

        <section class="rounded-2xl bg-slate-900 border border-slate-800 p-6 shadow-lg">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold">Выручка по дням (последние 7 дней)</h2>
                <span id="orders-today" class="text-sm text-slate-400"></span>
            </div>
            <div class="h-[340px]">
                <canvas id="revenueChart"></canvas>
            </div>
        </section>
    </div>

    <script src="js/admin.js"></script>
</body>

</html>
