<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/icon.jpg">
    <link rel="apple-touch-icon" href="/images/icon.jpg">
    <title>Express Pizza - KDS (Kitchen Display System)</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['class', '[data-theme="dark"]'],
            theme: {
                extend: {
                    colors: { primary: '#E30613' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
        }

        .kds-card {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-[#242424] border-b border-[#333] px-6 py-4 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <div
                class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center font-display font-black text-xl">
                EP</div>
            <div>
                <h1 class="font-display font-black text-2xl leading-tight">Кухня <span class="text-primary">KDS</span>
                </h1>
                <p class="text-xs text-gray-400">Ресторан #1 (пр-т Партизанский, 19)</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="ws-status"
                class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-red-500/20 text-red-400 text-sm font-bold">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div> Отключено
            </div>
            <div class="text-right">
                <div id="clock" class="font-display font-bold text-xl">--:--:--</div>
                <div id="date" class="text-xs text-gray-400">--.--.----</div>
            </div>
        </div>
    </header>

    <!-- Kanban Board -->
    <main class="flex-1 overflow-x-auto p-6 flex gap-6 hide-scrollbar">
        <!-- Column 1: Новые (NEW) -->
        <div class="flex-1 min-w-[300px] flex flex-col bg-[#242424] rounded-2xl border border-[#333] overflow-hidden">
            <div class="p-4 bg-[#2a2a2a] border-b border-[#333] flex justify-between items-center shrink-0">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-blue-500"></span> Новые
                </h2>
                <span class="bg-[#1a1a1a] px-2 py-0.5 rounded text-xs font-bold" id="count-new">0</span>
            </div>
            <div class="p-4 flex-1 overflow-y-auto space-y-4" id="col-NEW"></div>
        </div>

        <!-- Column 2: Готовятся (COOKING) -->
        <div class="flex-1 min-w-[300px] flex flex-col bg-[#242424] rounded-2xl border border-[#333] overflow-hidden">
            <div class="p-4 bg-[#2a2a2a] border-b border-[#333] flex justify-between items-center shrink-0">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-amber-500"></span> Готовятся
                </h2>
                <span class="bg-[#1a1a1a] px-2 py-0.5 rounded text-xs font-bold" id="count-cooking">0</span>
            </div>
            <div class="p-4 flex-1 overflow-y-auto space-y-4" id="col-COOKING"></div>
        </div>

        <!-- Column 3: В печи (BAKING) -->
        <div class="flex-1 min-w-[300px] flex flex-col bg-[#242424] rounded-2xl border border-[#333] overflow-hidden">
            <div class="p-4 bg-[#2a2a2a] border-b border-[#333] flex justify-between items-center shrink-0">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-orange-500"></span> В печи
                </h2>
                <span class="bg-[#1a1a1a] px-2 py-0.5 rounded text-xs font-bold" id="count-baking">0</span>
            </div>
            <div class="p-4 flex-1 overflow-y-auto space-y-4" id="col-BAKING"></div>
        </div>
    </main>

    <script src="/js/kds.js"></script>

</body>

</html>
