<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express Pizza - KDS (Kitchen Display System)</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['class', '[data-theme="dark"]'],
            theme: {
                extend: {
                    colors: { primary: '#E30613' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
        }

        .kds-card {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-[#242424] border-b border-[#333] px-6 py-4 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <div
                class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center font-display font-black text-xl">
                EP</div>
            <div>
                <h1 class="font-display font-black text-2xl leading-tight">Кухня <span class="text-primary">KDS</span>
                </h1>
                <p class="text-xs text-gray-400">Ресторан #1 (пр-т Партизанский, 19)</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="ws-status"
                class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-red-500/20 text-red-400 text-sm font-bold">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div> Отключено
            </div>
            <div class="text-right">
                <div id="clock" class="font-display font-bold text-xl">--:--:--</div>
                <div id="date" class="text-xs text-gray-400">--.--.----</div>
            </div>
        </div>
    </header>

    <!-- Kanban Board -->
    <main class="flex-1 overflow-x-auto p-6 flex gap-6 hide-scrollbar">
        <!-- Column 1: Новые (NEW) -->
        <div class="flex-1 min-w-[300px] flex flex-col bg-[#242424] rounded-2xl border border-[#333] overflow-hidden">
            <div class="p-4 bg-[#2a2a2a] border-b border-[#333] flex justify-between items-center shrink-0">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-blue-500"></span> Новые
                </h2>
                <span class="bg-[#1a1a1a] px-2 py-0.5 rounded text-xs font-bold" id="count-new">0</span>
            </div>
            <div class="p-4 flex-1 overflow-y-auto space-y-4" id="col-NEW"></div>
        </div>

        <!-- Column 2: Готовятся (COOKING) -->
        <div class="flex-1 min-w-[300px] flex flex-col bg-[#242424] rounded-2xl border border-[#333] overflow-hidden">
            <div class="p-4 bg-[#2a2a2a] border-b border-[#333] flex justify-between items-center shrink-0">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-amber-500"></span> Готовятся
                </h2>
                <span class="bg-[#1a1a1a] px-2 py-0.5 rounded text-xs font-bold" id="count-cooking">0</span>
            </div>
            <div class="p-4 flex-1 overflow-y-auto space-y-4" id="col-COOKING"></div>
        </div>

        <!-- Column 3: В печи (BAKING) -->
        <div class="flex-1 min-w-[300px] flex flex-col bg-[#242424] rounded-2xl border border-[#333] overflow-hidden">
            <div class="p-4 bg-[#2a2a2a] border-b border-[#333] flex justify-between items-center shrink-0">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-orange-500"></span> В печи
                </h2>
                <span class="bg-[#1a1a1a] px-2 py-0.5 rounded text-xs font-bold" id="count-baking">0</span>
            </div>
            <div class="p-4 flex-1 overflow-y-auto space-y-4" id="col-BAKING"></div>
        </div>
    </main>

    <script>
        // Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ru-RU');
            document.getElementById('date').textContent = now.toLocaleDateString('ru-RU');
        }, 1000);

        let ws = null;
        let orders = [];

        function initKDS() {
            // Fetch initial orders
            fetch('/api/kds/1/orders')
                .then(res => res.json())
                .then(data => {
                    orders = data;
                    renderBoard();
                })
                .catch(err => console.error('Failed to fetch orders:', err));

            // Connect WebSocket
            connectWS();
        }

        function connectWS() {
            const wsUrl = 'wss://express-pizza-antigravity.onrender.com/ws/kds';
            ws = new WebSocket(`${wsUrl}?restaurantId=1`);

            ws.onopen = () => {
                const statusEl = document.getElementById('ws-status');
                statusEl.className = 'flex items-center gap-2 px-3 py-1.5 rounded-lg bg-green-500/20 text-green-400 text-sm font-bold';
                statusEl.innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500"></div> В сети';
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'NEW_ORDER') {
                    orders.push(msg.data);
                    renderBoard();
                } else if (msg.type === 'STATUS_SYNC') {
                    const idx = orders.findIndex(o => o.id === msg.data.orderId);
                    if (idx !== -1) {
                        orders[idx].status = msg.data.status;
                        renderBoard();
                    }
                }
            };

            ws.onclose = () => {
                const statusEl = document.getElementById('ws-status');
                statusEl.className = 'flex items-center gap-2 px-3 py-1.5 rounded-lg bg-red-500/20 text-red-400 text-sm font-bold';
                statusEl.innerHTML = '<div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div> Переподключение...';
                setTimeout(connectWS, 3000);
            };
        }

        function changeStatus(orderId, newStatus) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'STATUS_UPDATE',
                    data: { orderId, status: newStatus }
                }));
            }
            // Optimistic update
            const idx = orders.findIndex(o => o.id === orderId);
            if (idx !== -1) {
                orders[idx].status = newStatus;
                renderBoard();
            }
        }

        function renderBoard() {
            const cols = { NEW: [], COOKING: [], BAKING: [] };

            orders.forEach(o => {
                if (cols[o.status]) cols[o.status].push(o);
            });

            document.getElementById('count-new').textContent = cols.NEW.length;
            document.getElementById('count-cooking').textContent = cols.COOKING.length;
            document.getElementById('count-baking').textContent = cols.BAKING.length;

            Object.keys(cols).forEach(status => {
                const container = document.getElementById(`col-${status}`);
                if (!container) return;

                container.innerHTML = cols[status].sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt)).map(order => {
                    const timeAgo = Math.floor((new Date() - new Date(order.createdAt)) / 60000);
                    let timeColor = timeAgo > 15 ? 'text-red-400' : (timeAgo > 10 ? 'text-amber-400' : 'text-gray-400');

                    let actionBtn = '';
                    if (status === 'NEW') {
                        actionBtn = `<button onclick="changeStatus(${order.id}, 'COOKING')" class="w-full mt-3 bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded-lg transition-colors">Взять в работу</button>`;
                    } else if (status === 'COOKING') {
                        actionBtn = `<button onclick="changeStatus(${order.id}, 'BAKING')" class="w-full mt-3 bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 rounded-lg transition-colors">В печь</button>`;
                    } else if (status === 'BAKING') {
                        actionBtn = `<button onclick="changeStatus(${order.id}, 'DELIVERY')" class="w-full mt-3 bg-green-600 hover:bg-green-500 text-white font-bold py-2 rounded-lg transition-colors">Готово</button>`;
                    }

                    const itemsHtml = order.items.map(item => `
                        <div class="py-1 border-b border-[#333] last:border-0 text-sm">
                            <div class="flex justify-between">
                                <span class="font-bold">${item.quantity}x ${item.product.name}</span>
                            </div>
                            ${item.modifiers && item.modifiers.length > 0 ? `
                                <div class="text-xs text-amber-500 mt-0.5">
                                    Модификаторы: ${item.modifiers.map(m => m.modifier.name).join(', ')}
                                </div>
                            ` : ''}
                        </div>
                    `).join('');

                    return `
                        <div class="bg-[#1a1a1a] p-4 rounded-xl border-l-4 ${status === 'NEW' ? 'border-blue-500' : status === 'COOKING' ? 'border-amber-500' : 'border-orange-500'} kds-card shadow-lg">
                            <div class="flex justify-betweenitems-start mb-2">
                                <h3 class="font-display font-black text-xl">Заказ #${order.id}</h3>
                                <span class="text-xs font-bold ${timeColor}">${timeAgo} мин</span>
                            </div>
                            <div class="text-xs text-gray-400 mb-2">Тип: ${order.source}</div>
                            <div class="bg-[#242424] rounded-lg p-2 mb-2">
                                ${itemsHtml}
                            </div>
                            ${actionBtn}
                        </div>
                    `;
                }).join('');
            });
        }

        // Initialize
        initKDS();
        setInterval(renderBoard, 60000); // Re-render every minute to update "time ago"
    </script>
</body>

</html>
